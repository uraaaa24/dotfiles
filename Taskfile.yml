version: "3"

tasks:
  setup:
    desc: Initial setup
    cmds:
      - task: link
      - task: brew:bootstrap
      - task: brew:bundle
      - task: mise:install
      - task: ai:setup

  link:
    desc: Link dotfiles
    cmds:
      - |
        set -euo pipefail
        DOTFILES="${DOTFILES:-$HOME/.dotfiles}"
        mkdir -p "$HOME/.config"

        link_path() {
          src="$1"
          dst="$2"

          if [ -L "$dst" ] || [ ! -e "$dst" ]; then
            ln -snf "$src" "$dst"
            return
          fi

          backup="$dst.backup.$(date +%Y%m%d%H%M%S)"
          mv "$dst" "$backup"
          ln -snf "$src" "$dst"
          echo "Backed up existing $dst to $backup"
        }

        link_path "$DOTFILES/.zshrc" "$HOME/.zshrc"
        link_path "$DOTFILES/.config/nvim" "$HOME/.config/nvim"
        link_path "$DOTFILES/.config/git" "$HOME/.config/git"
        link_path "$DOTFILES/.config/mise" "$HOME/.config/mise"
        link_path "$DOTFILES/.config/wezterm" "$HOME/.config/wezterm"
        link_path "$DOTFILES/.config/ghostty" "$HOME/.config/ghostty"
        link_path "$DOTFILES/.config/tmux" "$HOME/.config/tmux"

  brew:bootstrap:
    desc: Install Homebrew if missing
    cmds:
      - |
        set -euo pipefail
        if ! command -v brew >/dev/null 2>&1; then
          echo "🍺 Homebrew not found. Installing Homebrew..."
          NONINTERACTIVE=1 /bin/bash -c \
            "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi
      - |
        if command -v brew >/dev/null 2>&1; then
          brew_prefix="$(brew --prefix)"
          if [[ -d "$brew_prefix/share" ]]; then
            echo "🔐 Ensuring Homebrew share directory is not group/other writable..."
            chmod go-w "$brew_prefix/share" 2>/dev/null || true
            echo "  ✔ Checked $brew_prefix/share"
          fi
        fi

  brew:bundle:
    desc: Install packages from Brewfile
    cmds:
      - |
        set -euo pipefail
        if command -v brew >/dev/null 2>&1; then
          HOMEBREW_BUNDLE_NO_UPGRADE=1 brew bundle --file Brewfile
        else
          echo "⚠️ brew not found. Run: task brew:bootstrap"
          exit 1
        fi

  brew:update:
    desc: Update Homebrew packages
    cmds:
      - brew update
      - brew upgrade
      - brew cleanup

  brew:doctor:
    desc: Run Homebrew diagnostics
    cmds:
      - brew doctor

  mise:install:
    desc: Install runtimes via mise
    cmds:
      - |
        if command -v mise >/dev/null 2>&1; then
          mise install
        else
          echo "⚠️ mise not installed."
          exit 1
        fi

  ai:setup:
    desc: Install AI CLIs (Copilot, Codex, Gemini)
    cmds:
      - |
        set -euo pipefail
        if ! command -v npm >/dev/null 2>&1; then
          echo "⚠️ npm not found. Run: task mise:install"
          exit 1
        fi

        if ! command -v copilot >/dev/null 2>&1; then
          npm install -g @github/copilot
        fi

        if ! command -v codex >/dev/null 2>&1; then
          npm install -g @openai/codex
        fi

        if ! command -v gemini >/dev/null 2>&1; then
          npm install -g @google/gemini-cli
        fi

        echo "ℹ️ Next steps: run copilot, codex, gemini and follow login prompts."

  nvim:sync:
    desc: Sync Neovim plugins
    cmds:
      - nvim --headless "+Lazy! sync" +qa
